steps:
  # Step 1: Build the JAR using Gradle (with Volume for caching libraries)
  - name: 'gradle:8-jdk21'
    entrypoint: gradle
    args: ['build', '-x', 'test']
    dir: 'backend'
    volumes:
      - name: 'gradle-cache'
        path: '/root/.gradle'

  # Step 2: Run Liquibase migrations
  - name: 'liquibase/liquibase:4.25.1'
    args:
      - '--changelog-file=db/changelog/db.changelog-master.xml'
      - '--url=jdbc:postgresql://${_DB_URL}:${_DB_PORT}/${_DB_NAME}?currentSchema=alfabase_schema'
      - '--username=${_DB_USER}'
      - '--password=${_DB_PASSWORD}'
      - '--default-schema-name=alfabase_schema'
      - '--search-path=backend/src/main/resources/'
      - 'update'

  # Step 3: Build the Docker Image with Layer Caching
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Pull the latest image to use as a cache source
        docker pull gcr.io/$PROJECT_ID/amazing-api:latest || true
        docker build \
          -t gcr.io/$PROJECT_ID/amazing-api:$SHORT_SHA \
          -t gcr.io/$PROJECT_ID/amazing-api:latest \
          --cache-from gcr.io/$PROJECT_ID/amazing-api:latest \
          -f Dockerfile .

  # Step 4: Explicitly Push the image so Cloud Run can find it
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/amazing-api:$SHORT_SHA']

  # Step 5: Automatically Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'amazing-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/amazing-api:$SHORT_SHA'
      - '--region'
      - 'europe-central2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# Images to be pushed to the registry as a final step
images:
  - 'gcr.io/$PROJECT_ID/amazing-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/amazing-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  # Correct location for the volume definition
  volumes:
    - name: 'gradle-cache'
      path: '/root/.gradle'