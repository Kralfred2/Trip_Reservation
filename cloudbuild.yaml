steps:
  # Step 1: Build the JAR using Gradle
  - name: 'gradle:8-jdk21'
    entrypoint: gradle
    args: ['build', '-x', 'test']
    dir: 'backend'

  - name: 'liquibase/liquibase:4.25.1'
    env:
      - 'INSTALL_POSTGRESQL=true'
    args:
      - '--changelog-file=db/changelog/db.changelog-master.xml'
      - '--url=jdbc:postgresql://${_DB_URL}:${_DB_PORT}/${_DB_NAME}?currentSchema=alfabase_schema'
      - '--username=${_DB_USER}'
      - '--password=${_DB_PASSWORD}'
      - '--default-schema-name=alfabase_schema'
      - '--search-path=backend/src/main/resources/'
      - 'update'

  # Step 2: Build the Docker Image with a Unique ID
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/amazing-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/amazing-api:latest' # Keeps a latest tag for convenience
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 3: Automatically Deploy to Cloud Run in your Region
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'amazing-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/amazing-api:$SHORT_SHA'
      - '--region'
      - 'europe-central2' # Set your region here
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# Images to be pushed to the registry
images:
  - 'gcr.io/$PROJECT_ID/amazing-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/amazing-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY