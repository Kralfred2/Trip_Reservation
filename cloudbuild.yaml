steps:
  # Step 1: Build the JAR using Gradle
  - name: 'gradle:8-jdk21'
    entrypoint: gradle
    args: ['build', '-x', 'test']
    dir: 'backend'

  - name: 'liquibase/liquibase:4.25.1'
    env:
      - 'INSTALL_POSTGRESQL=true'
    args:
      - '--changelog-file=db/changelog/db.changelog-master.xml'
      - '--url=jdbc:postgresql://${_DB_URL}:${_DB_PORT}/${_DB_NAME}?currentSchema=alfabase_schema'
      - '--username=${_DB_USER}'
      - '--password=${_DB_PASSWORD}'
      - '--default-schema-name=alfabase_schema'
      - '--search-path=backend/src/main/resources/'
      - 'update'

# Step 2: Build the Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/amazing-api:$SHORT_SHA'
      - '.'

  # NEW STEP: Push the image to the registry immediately
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/amazing-api:$SHORT_SHA']

  # Step 3: Deploy to Cloud Run (Now it will find the image!)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'amazing-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/amazing-api:$SHORT_SHA'
      - '--region'
      - 'europe-central2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'